<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" font-family="Inter, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0f1f"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="beGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e7490"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="feGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="iotGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#65a30d"/>
      <stop offset="100%" stop-color="#bef264"/>
    </linearGradient>
    <linearGradient id="dbGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b45309"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="discGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4338ca"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="aiGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#be185d"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#cbd5e1"/>
    </marker>
    <marker id="arrEmit" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#22d3ee"/>
    </marker>
    <marker id="arrAlert" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#fbbf24"/>
    </marker>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 L0 0 0 40" fill="none" stroke="rgba(255,255,255,.04)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1600" height="1000" fill="url(#bg)"/>
  <rect width="1600" height="1000" fill="url(#grid)"/>

  <!-- Title -->
  <text x="800" y="48" text-anchor="middle" font-size="32" font-weight="700" fill="#e2e8f0">
    Office-IoT — System Architecture &amp; Workflow
  </text>
  <text x="800" y="74" text-anchor="middle" font-size="14" fill="#94a3b8">
    Single-tenant real-time office monitoring · Backend as source of truth · Discord bot in-process
  </text>

  <!-- =========================  TOP LANE: HARDWARE / USERS  ========================= -->
  <!-- User (Dashboard) -->
  <g>
    <rect x="60" y="120" width="180" height="80" rx="14" fill="#1e293b" stroke="#475569"/>
    <text x="150" y="150" text-anchor="middle" font-size="14" fill="#cbd5e1" font-weight="600">User / Operator</text>
    <text x="150" y="172" text-anchor="middle" font-size="11" fill="#94a3b8">Dashboard · REST + WebSocket</text>
    <text x="150" y="188" text-anchor="middle" font-size="11" fill="#94a3b8">Discord channel · alerts + !commands</text>
  </g>

  <!-- Discord Channel -->
  <g>
    <rect x="290" y="120" width="180" height="80" rx="14" fill="#1e293b" stroke="url(#discGrad)" stroke-width="1.6"/>
    <text x="380" y="150" text-anchor="middle" font-size="14" fill="#c7d2fe" font-weight="600">Discord Guild / Channel</text>
    <text x="380" y="172" text-anchor="middle" font-size="11" fill="#94a3b8">#office-alerts · messages</text>
    <text x="380" y="188" text-anchor="middle" font-size="11" fill="#94a3b8">Moderator + bot talk</text>
  </g>

  <!-- ESP32 / Hardware -->
  <g>
    <rect x="520" y="120" width="200" height="80" rx="14" fill="#1e293b" stroke="url(#iotGrad)" stroke-width="1.6"/>
    <text x="620" y="150" text-anchor="middle" font-size="14" fill="#bef264" font-weight="600">ESP32 + Relay Board</text>
    <text x="620" y="172" text-anchor="middle" font-size="11" fill="#94a3b8">15 GPIO · WiFi · MQTT / HTTP</text>
    <text x="620" y="188" text-anchor="middle" font-size="11" fill="#94a3b8">Fans + Lights (real)</text>
  </g>

  <!-- Simulator -->
  <g>
    <rect x="770" y="120" width="200" height="80" rx="14" fill="#1e293b" stroke="url(#iotGrad)" stroke-width="1.6"/>
    <text x="870" y="150" text-anchor="middle" font-size="14" fill="#bef264" font-weight="600">Simulator (in-process)</text>
    <text x="870" y="172" text-anchor="middle" font-size="11" fill="#94a3b8">10–15 s tick · 1–2 flips · 50% ON</text>
    <text x="870" y="188" text-anchor="middle" font-size="11" fill="#94a3b8">Mimics the ESP32</text>
  </g>

  <!-- Gemini -->
  <g>
    <rect x="1020" y="120" width="180" height="80" rx="14" fill="#1e293b" stroke="url(#aiGrad)" stroke-width="1.6"/>
    <text x="1110" y="150" text-anchor="middle" font-size="14" fill="#fbcfe8" font-weight="600">Google Gemini</text>
    <text x="1110" y="172" text-anchor="middle" font-size="11" fill="#94a3b8">LLM (optional)</text>
    <text x="1110" y="188" text-anchor="middle" font-size="11" fill="#94a3b8">Natural-language replies</text>
  </g>

  <!-- Rule-based Fallback -->
  <g>
    <rect x="1250" y="120" width="280" height="80" rx="14" fill="#1e293b" stroke="#475569"/>
    <text x="1390" y="150" text-anchor="middle" font-size="14" fill="#cbd5e1" font-weight="600">Rule-based Fallback</text>
    <text x="1390" y="172" text-anchor="middle" font-size="11" fill="#94a3b8">Hard-coded summaries when Gemini fails</text>
    <text x="1390" y="188" text-anchor="middle" font-size="11" fill="#94a3b8">Always-on, deterministic</text>
  </g>

  <!-- =========================  BACKEND CORE  ========================= -->
  <g>
    <rect x="60" y="260" width="1470" height="240" rx="20" fill="rgba(14,116,144,.08)" stroke="url(#beGrad)" stroke-width="2"/>
    <text x="80" y="290" font-size="16" font-weight="700" fill="#67e8f9">BACKEND · Node.js + TypeScript + Express 5</text>

    <!-- REST API -->
    <g>
      <rect x="90" y="320" width="170" height="80" rx="12" fill="#0f172a" stroke="#22d3ee" stroke-width="1.4"/>
      <text x="175" y="350" text-anchor="middle" font-size="14" fill="#e2e8f0" font-weight="600">REST API</text>
      <text x="175" y="372" text-anchor="middle" font-size="11" fill="#94a3b8">/api/devices · /usage</text>
      <text x="175" y="388" text-anchor="middle" font-size="11" fill="#94a3b8">/alerts · /office</text>
    </g>

    <!-- Socket.IO -->
    <g>
      <rect x="290" y="320" width="170" height="80" rx="12" fill="#0f172a" stroke="#22d3ee" stroke-width="1.4"/>
      <text x="375" y="350" text-anchor="middle" font-size="14" fill="#e2e8f0" font-weight="600">Socket.IO</text>
      <text x="375" y="372" text-anchor="middle" font-size="11" fill="#94a3b8">device_updated</text>
      <text x="375" y="388" text-anchor="middle" font-size="11" fill="#94a3b8">usage_updated · alert_triggered</text>
    </g>

    <!-- Services -->
    <g>
      <rect x="490" y="320" width="170" height="80" rx="12" fill="#0f172a" stroke="#a78bfa" stroke-width="1.4"/>
      <text x="575" y="350" text-anchor="middle" font-size="14" fill="#e2e8f0" font-weight="600">Devices Service</text>
      <text x="575" y="372" text-anchor="middle" font-size="11" fill="#94a3b8">list · toggle · group</text>
      <text x="575" y="388" text-anchor="middle" font-size="11" fill="#94a3b8">id / name resolution</text>
    </g>

    <g>
      <rect x="690" y="320" width="170" height="80" rx="12" fill="#0f172a" stroke="#a78bfa" stroke-width="1.4"/>
      <text x="775" y="350" text-anchor="middle" font-size="14" fill="#e2e8f0" font-weight="600">Usage Service</text>
      <text x="775" y="372" text-anchor="middle" font-size="11" fill="#94a3b8">aggregated load</text>
      <text x="775" y="388" text-anchor="middle" font-size="11" fill="#94a3b8">today / month kWh</text>
    </g>

    <g>
      <rect x="890" y="320" width="170" height="80" rx="12" fill="#0f172a" stroke="#fbbf24" stroke-width="1.4"/>
      <text x="975" y="350" text-anchor="middle" font-size="14" fill="#e2e8f0" font-weight="600">Alert Engine</text>
      <text x="975" y="372" text-anchor="middle" font-size="11" fill="#94a3b8">AFTER_HOURS</text>
      <text x="975" y="388" text-anchor="middle" font-size="11" fill="#94a3b8">CONTINUOUS_RUNTIME (2 h)</text>
    </g>

    <g>
      <rect x="1090" y="320" width="170" height="80" rx="12" fill="#0f172a" stroke="#22c55e" stroke-width="1.4"/>
      <text x="1175" y="350" text-anchor="middle" font-size="14" fill="#e2e8f0" font-weight="600">Simulator Loop</text>
      <text x="1175" y="372" text-anchor="middle" font-size="11" fill="#94a3b8">background timer</text>
      <text x="1175" y="388" text-anchor="middle" font-size="11" fill="#94a3b8">flips ON ↔ OFF</text>
    </g>

    <g>
      <rect x="1290" y="320" width="220" height="80" rx="12" fill="#0f172a" stroke="#818cf8" stroke-width="1.4"/>
      <text x="1400" y="350" text-anchor="middle" font-size="14" fill="#e2e8f0" font-weight="600">Discord Bot (discord.js v14)</text>
      <text x="1400" y="372" text-anchor="middle" font-size="11" fill="#94a3b8">MessageCreate handler</text>
      <text x="1400" y="388" text-anchor="middle" font-size="11" fill="#94a3b8">!status · !room · !usage</text>
    </g>

    <!-- Data Layer -->
    <g>
      <rect x="90" y="430" width="1420" height="48" rx="10" fill="#0f172a" stroke="#94a3b8" stroke-dasharray="4 4"/>
      <text x="110" y="460" font-size="13" fill="#cbd5e1" font-weight="600">DatabaseService (LowDB) —</text>
      <text x="350" y="460" font-size="12" fill="#94a3b8">single owner of db.json · devices[] · alerts[] · office{}</text>
    </g>
  </g>

  <!-- =========================  STORAGE  ========================= -->
  <g>
    <rect x="640" y="540" width="320" height="80" rx="14" fill="#1e1b0a" stroke="url(#dbGrad)" stroke-width="2"/>
    <text x="800" y="570" text-anchor="middle" font-size="16" fill="#fde68a" font-weight="700">LowDB · data/db.json</text>
    <text x="800" y="592" text-anchor="middle" font-size="12" fill="#94a3b8">devices[] · alerts[] (capped @ 200) · office{}</text>
    <text x="800" y="608" text-anchor="middle" font-size="12" fill="#94a3b8">Single-writer · filesystem persistence</text>
  </g>

  <!-- =========================  FRONTEND  ========================= -->
  <g>
    <rect x="60" y="660" width="1470" height="280" rx="20" fill="rgba(124,58,237,.06)" stroke="url(#feGrad)" stroke-width="2"/>
    <text x="80" y="690" font-size="16" font-weight="700" fill="#c4b5fd">FRONTEND · React 18 + Vite + Tailwind</text>

    <!-- Pages -->
    <g>
      <rect x="90" y="720" width="220" height="60" rx="10" fill="#0f172a" stroke="#7c3aed" stroke-width="1.2"/>
      <text x="200" y="744" text-anchor="middle" font-size="13" fill="#e2e8f0" font-weight="600">Pages</text>
      <text x="200" y="762" text-anchor="middle" font-size="11" fill="#94a3b8">Dashboard · Room · Alerts · About</text>
    </g>

    <!-- Components -->
    <g>
      <rect x="330" y="720" width="220" height="60" rx="10" fill="#0f172a" stroke="#7c3aed" stroke-width="1.2"/>
      <text x="440" y="744" text-anchor="middle" font-size="13" fill="#e2e8f0" font-weight="600">Components</text>
      <text x="440" y="762" text-anchor="middle" font-size="11" fill="#94a3b8">DeviceCard · RoomCard · Office SVG</text>
    </g>

    <!-- Hooks -->
    <g>
      <rect x="570" y="720" width="220" height="60" rx="10" fill="#0f172a" stroke="#7c3aed" stroke-width="1.2"/>
      <text x="680" y="744" text-anchor="middle" font-size="13" fill="#e2e8f0" font-weight="600">Hooks</text>
      <text x="680" y="762" text-anchor="middle" font-size="11" fill="#94a3b8">useDevices · useUsage · useAlerts</text>
    </g>

    <!-- TanStack Query -->
    <g>
      <rect x="810" y="720" width="220" height="60" rx="10" fill="#0f172a" stroke="#22d3ee" stroke-width="1.2"/>
      <text x="920" y="744" text-anchor="middle" font-size="13" fill="#e2e8f0" font-weight="600">TanStack Query (cache)</text>
      <text x="920" y="762" text-anchor="middle" font-size="11" fill="#94a3b8">merge socket events via setQueryData</text>
    </g>

    <!-- Socket Context -->
    <g>
      <rect x="1050" y="720" width="220" height="60" rx="10" fill="#0f172a" stroke="#22d3ee" stroke-width="1.2"/>
      <text x="1160" y="744" text-anchor="middle" font-size="13" fill="#e2e8f0" font-weight="600">Socket.IO Client</text>
      <text x="1160" y="762" text-anchor="middle" font-size="11" fill="#94a3b8">single connection · auto-reconnect</text>
    </g>

    <!-- Axios -->
    <g>
      <rect x="1290" y="720" width="220" height="60" rx="10" fill="#0f172a" stroke="#7c3aed" stroke-width="1.2"/>
      <text x="1400" y="744" text-anchor="middle" font-size="13" fill="#e2e8f0" font-weight="600">Axios</text>
      <text x="1400" y="762" text-anchor="middle" font-size="11" fill="#94a3b8">REST calls · error interceptor</text>
    </g>

    <!-- Connection details -->
    <g>
      <rect x="90" y="810" width="1420" height="42" rx="10" fill="#0f172a" stroke="#94a3b8" stroke-dasharray="4 4"/>
      <text x="110" y="838" font-size="12" fill="#94a3b8">Persistent live view via Socket.IO — no polling needed once connected.</text>
      <text x="900" y="838" font-size="12" fill="#94a3b8">TanStack Query + Framer Motion + Recharts + React-Icons</text>
    </g>
  </g>

  <!-- =========================  ARROWS  ========================= -->

  <!-- User -> Dashboard (conceptually encompassed below) -->
  <!-- (Visual cue: dashboard sits above the Browser area, modelled by REST/Socket arrows) -->

  <!-- User <-> REST/Socket (back to backend REST + Socket) -->
  <!-- Implicit: User drives via REST + listens via Socket; drawn as arrow into REST API from above top lane -->
  <line x1="150" y1="200" x2="150" y2="320" stroke="#94a3b8" stroke-width="1.4" marker-end="url(#arr)"/>
  <text x="158" y="265" font-size="11" fill="#94a3b8">HTTP REST</text>

  <line x1="380" y1="200" x2="380" y2="320" stroke="#94a3b8" stroke-width="1.4" marker-end="url(#arr)"/>
  <text x="388" y="265" font-size="11" fill="#94a3b8">WebSocket</text>

  <!-- ESP32 -> Devices Service -->
  <line x1="620" y1="200" x2="575" y2="320" stroke="#bef264" stroke-width="1.4" stroke-dasharray="6 4" marker-end="url(#arr)"/>
  <text x="630" y="265" font-size="11" fill="#bef264">POST state (real hw)</text>

  <!-- Simulator -> Devices Service -->
  <line x1="870" y1="200" x2="1150" y2="320" stroke="#bef264" stroke-width="1.4" stroke-dasharray="6 4" marker-end="url(#arr)"/>
  <text x="930" y="265" font-size="11" fill="#bef264">UPDATE state</text>

  <!-- Backend services -> LowDB -->
  <line x1="800" y1="478" x2="800" y2="540" stroke="#fbbf24" stroke-width="1.8" marker-end="url(#arr)"/>
  <text x="816" y="515" font-size="11" fill="#fbbf24">read/write</text>

  <!-- Devices/Toggle -> Socket emit (then to FE) -->
  <line x1="375" y1="320" x2="375" y2="240" stroke="#22d3ee" stroke-width="1.6" marker-end="url(#arrEmit)"/>
  <text x="232" y="280" font-size="11" fill="#67e8f9">emit · device_updated</text>

  <!-- Usage Service -> Socket emit -->
  <line x1="775" y1="320" x2="375" y2="240" stroke="#22d3ee" stroke-width="1.6" marker-end="url(#arrEmit)"/>
  <text x="560" y="290" font-size="11" fill="#67e8f9">emit · usage_updated</text>

  <!-- Alert Engine -> Socket emit + Discord + DB -->
  <line x1="975" y1="320" x2="375" y2="240" stroke="#fbbf24" stroke-width="1.6" marker-end="url(#arrAlert)"/>
  <text x="600" y="305" font-size="11" fill="#fbbf24">emit · alert_triggered</text>

  <line x1="975" y1="360" x2="380" y2="200" stroke="#f59e0b" stroke-width="1.6" marker-end="url(#arrAlert)"/>
  <text x="620" y="240" font-size="11" fill="#fcd34d">notify Discord channel</text>

  <line x1="975" y1="400" x2="800" y2="540" stroke="#fbbf24" stroke-width="1.4" marker-end="url(#arrAlert)"/>
  <text x="996" y="475" font-size="11" fill="#fbbf24">push alert</text>

  <!-- Discord Bot -> Gemini / fallback -->
  <line x1="1400" y1="320" x2="1110" y2="200" stroke="#f472b6" stroke-width="1.4" marker-end="url(#arr)"/>
  <text x="1230" y="265" font-size="11" fill="#fbcfe8">prompt</text>

  <line x1="1110" y1="200" x2="1400" y2="320" stroke="#f472b6" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#arr)"/>
  <text x="1190" y="245" font-size="11" fill="#fbcfe8">reply / error</text>

  <line x1="1400" y1="320" x2="1390" y2="200" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="1410" y="265" font-size="11" fill="#cbd5e1">fallback</text>

  <!-- Discord Bot <-> Discord Channel -->
  <line x1="1290" y1="360" x2="470" y2="200" stroke="#818cf8" stroke-width="1.4" marker-end="url(#arr)"/>
  <text x="780" y="295" font-size="11" fill="#c7d2fe">post alerts + reply</text>

  <!-- Backend -> Frontend REST + Socket (visualized bottom-of-backend -> top-of-frontend) -->
  <line x1="175" y1="500" x2="175" y2="720" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="185" y="620" font-size="11" fill="#cbd5e1">axios → REST</text>

  <line x1="1160" y1="500" x2="1160" y2="720" stroke="#22d3ee" stroke-width="1.8" marker-end="url(#arrEmit)"/>
  <text x="1170" y="620" font-size="11" fill="#67e8f9">socket → live events</text>

  <!-- Legend -->
  <g>
    <rect x="60" y="960" width="1480" height="30" rx="6" fill="#0f172a" stroke="#334155"/>
    <text x="80" y="980" font-size="11" fill="#94a3b8">Legend:</text>
    <line x1="140" y1="976" x2="170" y2="976" stroke="#94a3b8" stroke-width="1.4" marker-end="url(#arr)"/>
    <text x="180" y="980" font-size="11" fill="#cbd5e1">REST / control flow</text>
    <line x1="310" y1="976" x2="340" y2="976" stroke="#22d3ee" stroke-width="1.8" marker-end="url(#arrEmit)"/>
    <text x="350" y="980" font-size="11" fill="#67e8f9">Socket.IO push</text>
    <line x1="490" y1="976" x2="520" y2="976" stroke="#fbbf24" stroke-width="1.8" marker-end="url(#arrAlert)"/>
    <text x="530" y="980" font-size="11" fill="#fcd34d">Alert path</text>
    <line x1="650" y1="976" x2="680" y2="976" stroke="#bef264" stroke-width="1.4" stroke-dasharray="6 4" marker-end="url(#arr)"/>
    <text x="690" y="980" font-size="11" fill="#bef264">Hardware / Simulator source</text>
    <line x1="880" y1="976" x2="910" y2="976" stroke="#f472b6" stroke-width="1.4" marker-end="url(#arr)"/>
    <text x="920" y="980" font-size="11" fill="#fbcfe8">LLM integration</text>
  </g>
</svg>
